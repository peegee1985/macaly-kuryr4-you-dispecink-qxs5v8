name: Android Driver Release

on:
  workflow_dispatch:
  push:
    branches:
      - agent/standalone-android-apk
    paths:
      - "mobile/**"
      - "convex/**"
      - "src/routes/ridic.pod.$rideId.tsx"
      - ".github/workflows/android-driver-release.yml"

permissions:
  contents: write

concurrency:
  group: android-driver-release
  cancel-in-progress: false

jobs:
  release-apk:
    name: Build and publish signed driver APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    env:
      CI: "1"
      EXPO_PUBLIC_CONVEX_URL: https://amicable-dogfish-440.eu-west-1.convex.cloud
      EXPO_NO_TELEMETRY: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Validate TypeScript
        run: npm run typecheck

      - name: Validate signing secrets
        env:
          DRIVER_KEYSTORE_BASE64: ${{ secrets.DRIVER_KEYSTORE_BASE64 }}
          DRIVER_KEYSTORE_PASSWORD: ${{ secrets.DRIVER_KEYSTORE_PASSWORD }}
          DRIVER_KEY_ALIAS: ${{ secrets.DRIVER_KEY_ALIAS }}
          DRIVER_KEY_PASSWORD: ${{ secrets.DRIVER_KEY_PASSWORD }}
        run: |
          test -n "$DRIVER_KEYSTORE_BASE64"
          test -n "$DRIVER_KEYSTORE_PASSWORD"
          test -n "$DRIVER_KEY_ALIAS"
          test -n "$DRIVER_KEY_PASSWORD"

      - name: Restore release keystore
        env:
          DRIVER_KEYSTORE_BASE64: ${{ secrets.DRIVER_KEYSTORE_BASE64 }}
        run: echo "$DRIVER_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/kuryr4you-driver.jks"

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Build signed production APK
        working-directory: mobile/android
        env:
          K4Y_KEYSTORE_PATH: ${{ runner.temp }}/kuryr4you-driver.jks
          K4Y_KEYSTORE_PASSWORD: ${{ secrets.DRIVER_KEYSTORE_PASSWORD }}
          K4Y_KEY_ALIAS: ${{ secrets.DRIVER_KEY_ALIAS }}
          K4Y_KEY_PASSWORD: ${{ secrets.DRIVER_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Prepare release asset
        run: cp android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/kuryr4you-ridic.apk

      - name: Verify APK signature
        run: |
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -1)"
          test -n "$APKSIGNER"
          "$APKSIGNER" verify --verbose android/app/build/outputs/apk/release/kuryr4you-ridic.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: kuryr4you-ridic-release-apk
          path: mobile/android/app/build/outputs/apk/release/kuryr4you-ridic.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish permanent download
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view driver-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || gh release create driver-latest --repo "$GITHUB_REPOSITORY" --title "Kuryr4You Řidič – aktuální verze" --notes "Podepsaná produkční verze řidičské aplikace."
          gh release upload driver-latest android/app/build/outputs/apk/release/kuryr4you-ridic.apk --repo "$GITHUB_REPOSITORY" --clobber
