name: Expo Android releases

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - "mobile-dispatcher/**"
      - ".github/workflows/eas-android-build.yml"

permissions:
  contents: write

concurrency:
  group: eas-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_NO_VCS: "1"
      TARGET_BRANCH: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            mobile/package-lock.json
            mobile-dispatcher/package-lock.json

      - name: Ověřit Expo token
        run: |
          test -n "$EXPO_TOKEN" || { echo "::error::V GitHub Actions chybí secret EXPO_TOKEN"; exit 1; }
          npx eas-cli@21.0.2 whoami

      - name: Určit změněné aplikace
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "driver=true" >> "$GITHUB_OUTPUT"
            echo "dispatcher=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --quiet "${{ github.event.before }}" "${{ github.sha }}" -- mobile/; then
            echo "driver=false" >> "$GITHUB_OUTPUT"
          else
            echo "driver=true" >> "$GITHUB_OUTPUT"
          fi
          if git diff --quiet "${{ github.event.before }}" "${{ github.sha }}" -- mobile-dispatcher/; then
            echo "dispatcher=false" >> "$GITHUB_OUTPUT"
          else
            echo "dispatcher=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Nainstalovat a zkontrolovat obě aplikace
        run: |
          npm ci
          npm ci --prefix mobile
          npm run typecheck --prefix mobile
          npm ci --prefix mobile-dispatcher
          npm run typecheck --prefix mobile-dispatcher
          npx expo-doctor mobile-dispatcher

      - name: Nasadit chatový backend Convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          test -n "$CONVEX_DEPLOY_KEY" || { echo "::error::V GitHub Actions chybí secret CONVEX_DEPLOY_KEY"; exit 1; }
          npx convex deploy

      - name: Napojit projekty na EAS
        run: |
          if ! jq -e '.expo.extra.eas.projectId // empty' mobile/app.json >/dev/null; then
            (cd mobile && npx eas-cli@21.0.2 project:init --non-interactive --force)
          fi
          if ! (cd mobile-dispatcher && npx expo config --json | jq -e '.extra.eas.projectId // empty' >/dev/null); then
            (cd mobile-dispatcher && npx eas-cli@21.0.2 project:init --non-interactive --force)
          fi

          if ! git diff --quiet -- mobile/app.json mobile-dispatcher/app.json mobile-dispatcher/app.config.js; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add mobile/app.json mobile-dispatcher/app.json mobile-dispatcher/app.config.js
            git commit -m "chore: link Android apps to Expo EAS"
            git push origin "HEAD:${TARGET_BRANCH}"
          fi

      - name: Sestavit řidičské AAB pro Google Play
        if: steps.changes.outputs.driver == 'true'
        run: |
          (cd mobile && npx eas-cli@21.0.2 build --platform android --profile production --non-interactive --wait --json > ../driver-build.json)
          DRIVER_URL=$(jq -r '.[0].artifacts.buildUrl' driver-build.json)
          test -n "$DRIVER_URL" && test "$DRIVER_URL" != "null"
          curl --fail --location "$DRIVER_URL" --output kuryr4you-ridic.aab

      - name: Sestavit instalační APK řidiče
        if: steps.changes.outputs.driver == 'true'
        run: |
          (cd mobile && npx eas-cli@21.0.2 build --platform android --profile preview --non-interactive --wait --json > ../driver-apk-build.json)
          DRIVER_APK_URL=$(jq -r '.[0].artifacts.buildUrl' driver-apk-build.json)
          test -n "$DRIVER_APK_URL" && test "$DRIVER_APK_URL" != "null"
          curl --fail --location "$DRIVER_APK_URL" --output kuryr4you-ridic.apk
          unzip -p kuryr4you-ridic.apk assets/app.config | jq -e '.version == "0.8.0" and .android.package == "cz.kuryr4you.driver"'
          unzip -p kuryr4you-ridic.apk assets/index.android.bundle > driver-index.android.bundle
          grep -aFq "https://amicable-dogfish-440.eu-west-1.convex.cloud" driver-index.android.bundle

      - name: Sestavit instalační APK dispečinku
        if: steps.changes.outputs.dispatcher == 'true'
        run: |
          (cd mobile-dispatcher && npx eas-cli@21.0.2 build --platform android --profile preview --non-interactive --wait --json > ../dispatcher-build.json)
          DISPATCHER_URL=$(jq -r '.[0].artifacts.buildUrl' dispatcher-build.json)
          test -n "$DISPATCHER_URL" && test "$DISPATCHER_URL" != "null"
          curl --fail --location "$DISPATCHER_URL" --output kuryr4you-dispecink.apk
          unzip -p kuryr4you-dispecink.apk assets/app.config | jq -e '.version == "1.4.0" and .android.package == "cz.kuryr4you.dispatcher"'
          unzip -p kuryr4you-dispecink.apk assets/index.android.bundle > dispatcher-index.android.bundle
          grep -aFq "https://amicable-dogfish-440.eu-west-1.convex.cloud" dispatcher-index.android.bundle

      - uses: actions/upload-artifact@v4
        with:
          name: android-release-files
          path: |
            kuryr4you-ridic.aab
            kuryr4you-ridic.apk
            kuryr4you-dispecink.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publikovat dispečerské APK na GitHub
        if: github.ref == 'refs/heads/main' && steps.changes.outputs.dispatcher == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view dispatcher-latest >/dev/null 2>&1 || gh release create dispatcher-latest --title "Kuryr4You Dispečink 1.4.0" --notes "Klikatelné odkazy a fotografie v nativním chatu."
          gh release upload dispatcher-latest kuryr4you-dispecink.apk --clobber

      - name: Publikovat řidičské APK a AAB na GitHub
        if: github.ref == 'refs/heads/main' && steps.changes.outputs.driver == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view driver-latest >/dev/null 2>&1 || gh release create driver-latest --title "Kuryr4You Řidič 0.8.0" --notes "Klikatelné odkazy a fotografie v nativním chatu."
          gh release upload driver-latest kuryr4you-ridic.apk kuryr4you-ridic.aab --clobber
